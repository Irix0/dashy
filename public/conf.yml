---
# Page meta info, like heading, footer text and nav links
pageInfo:
  title: Dashy
  description: Tableau de bord
  navLinks:
  - title: Google
    path: https://google.be

# Optional app settings and configuration
appConfig:
  disableConfiguration: true
  theme: colorful
  showSplashScreen: false
  statusCheck: false
  statusCheckInterval: 30
  webSearch:
    disableWebSearch: false
    searchEngine: google
  hideComponents:
    hideFooter: true
    hideSettings: true

# Main content - An array of sections, each containing an array of items
sections:
- name: ' '
  icon: fas fa-info
  items:
  widgets:
    - type: clock
      options:
        timeZone: Europe/Brussels
        customCityName: ' '
        format: fr-FR
        hideDate: false
    - type: weather
      options:
        apiKey: 'd47e8583dbd9c9e73f9a759a718f17c9'
        city: Liège
        units: metric
- name: ULiège
  icon: fas fa-school
  items:
    - title: myULiège
      description: Site principal
      icon: favicon
      url: https://my.uliege.be/
    - title: eCampus
      description: Ressources
      icon: https://www.ecampus.uliege.be/favicon.ico
      url: https://www.ecampus.uliege.be/
- name: Serveur
  icon: fas fa-server
  items:
  - title: Proxmox
    description: Noeud principal
    icon: si-proxmox
    url: https://proxmox.robertproxy.site/
    statusCheck: true
  - title: Home Assistant
    description: Home Assistant est un système de domotique open-source qui vous permet de contrôler et d’automatiser votre maison.
    icon: si-homeassistant
    url: https://ha.robertproxy.site
    statusCheck: true
  - title: Nginx Proxy
    description: NGINX Proxy Manager
    icon: si-nginxproxymanager
    url: https://pr.robertproxy.site
    statusCheck: true
    statusCheckAcceptCodes: '403'
  - title: Zigbee2MQTT
    description: Zigbee to MQTT
    icon: si-zigbee
    url: https://z2m.robertproxy.site
    statusCheck: true
  - subItems:
      - title: Cloudflare
        url: https://dash.cloudflare.com/
        icon: si-cloudflare
      - title: Netlify
        url: https://app.netlify.com/
        icon: si-netlify
      - title: Svelt
        url: https://svelte.dev/docs
        icon: si-svelte
      - title: Go
        url: https://go.dev/doc
        icon: si-go
- name: Getting Started
  icon: fas fa-rocket
  items:
  - title: Dashy Live
    description: Development a project management links for Dashy
    icon: https://i.ibb.co/qWWpD0v/astro-dab-128.png
    url: https://live.dashy.to/
    target: newtab
  - title: GitHub
    description: Source Code, Issues and Pull Requests
    url: https://github.com/lissy93/dashy
    icon: favicon
  - title: Docs
    description: Configuring & Usage Documentation
    provider: Dashy.to
    icon: far fa-book
    url: https://dashy.to/docs
  - title: Showcase
    description: See how others are using Dashy
    url: https://github.com/Lissy93/dashy/blob/master/docs/showcase.md
    icon: far fa-grin-hearts
  - title: Config Guide
    description: See full list of configuration options
    url: https://github.com/Lissy93/dashy/blob/master/docs/configuring.md
    icon: fas fa-wrench
  - title: Support
    description: Get help with Dashy, raise a bug, or get in contact
    url: https://github.com/Lissy93/dashy/blob/master/.github/SUPPORT.md
    icon: far fa-hands-helping
  widgets:
    - type: joke
      options:
        safeMode: false
        language: fr
        category: all
  
